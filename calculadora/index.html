<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistemas Mora - Core v1.2.0</title>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;700&family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="menu-btn" onclick="toggleSidebar()">
        <i class="fas fa-bars"></i>
    </div>

    <nav class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <i class="fas fa-microchip"></i>
            <span>SISTEMAS MORA</span>
        </div>
        <ul>
            <li onclick="openTab('calculadora')" id="li-calc" class="active"><i class="fas fa-calculator"></i> Calculadora</li>
            <li onclick="openTab('terminal')" id="li-term"><i class="fas fa-terminal"></i> Terminal</li>
            <li onclick="openTab('config')" id="li-conf"><i class="fas fa-cog"></i> Config</li>
        </ul>
    </nav>

    <section id="calculadora" class="tab-content active">
        <header class="main-header">
            <h1 class="neon-title">CALCULADORA NEÓN</h1>
        </header>

        <div class="dashboard-grid">
            <div class="card calc-card">
                <div class="display">
                    <input type="text" id="result" placeholder="0.00" readonly>
                </div>
                <div class="keypad">
                    <button class="btn-sci" onclick="input('Math.sin(')">sin</button>
                    <button class="btn-sci" onclick="input('Math.cos(')">cos</button>
                    <button class="btn-sci" onclick="input('Math.tan(')">tan</button>
                    <button class="btn-sci" onclick="input('Math.log10(')">log</button>
                    <button class="btn-clear" onclick="clearScreen()">C</button>
                    <button class="btn-del" onclick="del()">DEL</button>
                    <button class="btn-op" onclick="input('%')">%</button>
                    <button class="btn-op" onclick="input('/')">÷</button>
                    <button onclick="input('7')">7</button><button onclick="input('8')">8</button><button onclick="input('9')">9</button>
                    <button class="btn-op" onclick="input('*')">×</button>
                    <button onclick="input('4')">4</button><button onclick="input('5')">5</button><button onclick="input('6')">6</button>
                    <button class="btn-op" onclick="input('-')">-</button>
                    <button onclick="input('1')">1</button><button onclick="input('2')">2</button><button onclick="input('3')">3</button>
                    <button class="btn-op" onclick="input('+')">+</button>
                    <button onclick="input('0')">0</button><button onclick="input('.')">.</button><button onclick="input('Math.PI')">π</button>
                    <button class="btn-equal" onclick="calculate()">EXE</button>
                </div>
            </div>

            <div class="card history-card">
                <h3><i class="fas fa-list-ul"></i> Historial</h3>
                <div id="history-list" class="history-list"></div>
                <button class="btn-history-clear" onclick="clearHistory()">Borrar Datos</button>
            </div>

            <div class="card slider-card">
                <div class="slider-container">
                    <div class="slide fade">
                        <img src="https://res.cloudinary.com/dz209s6jk/image/upload/v1669934210/Screenshots/qxrlrqlwptcnn5z8ajt5.jpg">
                        <div class="slide-text">Realiza tus propios calculos</div>
                    </div>
                    <div class="slide fade">
                        <img src="https://pymstatic.com/26218/conversions/como-hacer-amigos-en-internet-wide.jpg">
                        <div class="slide-text">Indaga por nuestra web para más informacion y conocimientos</div>
                    </div>
                    <a class="prev" onclick="plusSlides(-1)">&#10094;</a>
                    <a class="next" onclick="plusSlides(1)">&#10095;</a>
                </div>
            </div>
        </div>
    </section>

    <section id="terminal" class="tab-content">
        <header class="main-header"><h1 class="neon-title" style="color:#0f0; text-shadow: 0 0 15px #0f0;">TERMINAL CORE</h1></header>
        <div class="dashboard-grid">
            <div class="card terminal-box" style="grid-column: 1 / -1; border-color: #0f0;">
                <div id="terminal-output">> SISTEMA LISTO...</div>
                <div class="terminal-input-line">
                    <span style="color:#0f0">MORA@CORE:~$</span>
                    <input type="text" id="term-input" onkeydown="runCommand(event)">
                </div>
            </div>
        </div>
    </section>

    <section id="config" class="tab-content">
        <header class="main-header"><h1 class="neon-title" style="color:var(--yellow); text-shadow: 0 0 15px var(--yellow);">CONFIGURACIÓN</h1></header>
        <div class="dashboard-grid">
            <div class="card" style="border-color: var(--yellow); grid-column: 1 / -1;">
                <h3 style="color:var(--yellow)">OPCIONES DE INTERFAZ</h3>
                <p style="margin-top:20px">Sensibilidad Neón: <input type="range" style="width:100%"></p>
            </div>
        </div>
    </section>

    <div class="dashboard-grid">
        <div class="card notes-card">
            <label class="notes-label"><i class="fas fa-terminal"></i> CONSOLA DE APUNTES:</label>
            <textarea id="free-notes" placeholder="Escribe aquí..."></textarea>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
